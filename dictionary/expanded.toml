# ─── dictionary/main.lxdb.toml ────────────────────────────────────────────────
# Source dictionary for the LXDB binary format.
#
# To compile:
#   lxdb compile dictionary/main.lxdb.toml dictionary/main.lxdb
#
# The compiled .lxdb file is what gets loaded at runtime.
# This TOML file is the human-editable source of truth.
# ─────────────────────────────────────────────────────────────────────────────

[meta]
version = 1
description = "Main translation dictionary for Whisper Real-Time Transcription"

# BCP-47 language codes → human-readable names.
# Add/remove languages here. The compiler handles all wiring automatically.
[languages]
en = "English"
pl = "Polish"
es = "Spanish"
fr = "French"
de = "German"
ru = "Russian"
uk = "Ukrainian"

# ─── Concepts ─────────────────────────────────────────────────────────────────
# Each [[concepts]] block is ONE semantic concept.
# Keys are BCP-47 language codes from [languages] above.
# Missing languages are silently skipped (no translation stored for that lang).
# Multi-word phrases are allowed — they hash as a unit (ngram support).
# Generated keyword is generated by python script, custom is, well, custom added.
# ─────────────────────────────────────────────────────────────────────────────

